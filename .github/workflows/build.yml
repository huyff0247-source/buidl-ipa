name: Build Xyris TIPA

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build with Theos
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install ldid make xz

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
            ~/Library/Caches/theos
          key: theos-${{ runner.os }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install Theos
        run: |
          if [ ! -d "$HOME/theos/.git" ]; then
            rm -rf "$HOME/theos"
            git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          else
            git -C "$HOME/theos" pull --ff-only
            git -C "$HOME/theos" submodule update --init --recursive
          fi
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"

      - name: Install iPhoneOS 16.5 SDK
        run: |
          mkdir -p "$HOME/theos/sdks"
          if [ ! -d "$HOME/theos/sdks/iPhoneOS16.5.sdk" ]; then
            curl -L -o /tmp/iPhoneOS16.5.sdk.tar.xz \
              https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
            tar -xf /tmp/iPhoneOS16.5.sdk.tar.xz -C "$HOME/theos/sdks"
          fi
          ls -la "$HOME/theos/sdks"

      - name: Build package
        run: |
          make clean package FINALPACKAGE=1

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xyris-tipa
          path: packages/*.tipa
          if-no-files-found: error
